<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
    <rect width="1000" height="600" fill="#050505"/>
    <rect x="50" y="50" width="900" height="500" rx="20" fill="#3A3A3A" opacity="0.3"/>
    <!-- Bar chart -->
    <rect x="100" y="330" width="60" height="120" fill="#FF3D2E" rx="5"/><rect x="200" y="270" width="60" height="180" fill="#FF3D2E" rx="5"/><rect x="300" y="360" width="60" height="90" fill="#FF3D2E" rx="5"/><rect x="400" y="210" width="60" height="240" fill="#FF3D2E" rx="5"/><rect x="500" y="290" width="60" height="160" fill="#FF3D2E" rx="5"/><rect x="600" y="250" width="60" height="200" fill="#FF3D2E" rx="5"/><rect x="700" y="170" width="60" height="280" fill="#FF3D2E" rx="5"/>
    <!-- Line chart -->
    <polyline points="100,200 250,150 400,180 550,100 700,130 850,80" fill="none" stroke="#00E1FF" stroke-width="4"/>
    <circle cx="850" cy="80" r="8" fill="#00E1FF"/>
    <!-- Pie chart -->
